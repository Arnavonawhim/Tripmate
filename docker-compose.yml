services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
      image: pgvector/pgvector:pg16   
      environment:
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: tripmate
      ports:
        - "5433:5432"
      volumes:
        - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: